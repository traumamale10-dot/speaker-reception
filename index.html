<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>แผนกต้อนรับวิทยากร</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a4fa0;
  --primary-light: #2563c7;
  --primary-dark: #0f2f60;
  --accent: #e8a020;
  --success: #16a34a;
  --danger: #dc2626;
  --bg: #f0f4fb;
  --text: #1e2a3a;
  --muted: #6b7a8d;
  --border: #d0daea;
  --shadow: 0 2px 12px rgba(26,79,160,0.10);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: linear-gradient(140deg, var(--primary-dark) 0%, var(--primary) 55%, var(--primary-light) 100%);
  color: white; padding: 24px 16px 56px; text-align: center; position: relative; overflow: hidden;
}
.header::before { content:''; position:absolute; top:-50px; right:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.06); }
.header::after { content:''; position:absolute; bottom:-30px; left:-30px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,0.04); }
.header-icon { font-size:38px; margin-bottom:6px; }
.header h1 { font-family:'Kanit',sans-serif; font-size:20px; font-weight:700; letter-spacing:.5px; }
.header-sub { font-size:12px; opacity:.7; margin-top:4px; }
.header-date { margin-top:10px; background:rgba(255,255,255,0.15); border-radius:20px; padding:5px 16px; font-size:12px; display:inline-block; }

.main { padding:0 12px 80px; margin-top:-44px; position:relative; z-index:1; }

.tab-bar { display:flex; background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; margin-bottom:14px; }
.tab-btn { flex:1; padding:13px 6px; border:none; background:transparent; font-family:'Sarabun',sans-serif; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); background:rgba(26,79,160,0.04); font-weight:700; }
.badge { display:inline-block; background:var(--accent); color:white; font-size:10px; padding:1px 6px; border-radius:10px; margin-left:3px; font-weight:700; }

.summary-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
.sum-card { background:white; border-radius:var(--radius-sm); padding:12px 6px; text-align:center; box-shadow:var(--shadow); }
.sum-num { font-family:'Kanit',sans-serif; font-size:28px; font-weight:700; line-height:1; }
.sum-lbl { font-size:11px; color:var(--muted); margin-top:3px; }
.sum-card.c-all .sum-num { color:var(--primary); }
.sum-card.c-in .sum-num { color:var(--success); }
.sum-card.c-out .sum-num { color:var(--muted); }

.search-wrap { position:relative; margin-bottom:12px; }
.search-wrap span { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:18px; color:var(--muted); }
.search-input { width:100%; padding:12px 12px 12px 42px; border:2px solid var(--border); border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif; font-size:15px; background:white; color:var(--text); outline:none; box-shadow:var(--shadow); transition:border-color .2s; }
.search-input:focus { border-color:var(--primary); }

.speaker-list { display:flex; flex-direction:column; gap:12px; }
.speaker-card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border-left:5px solid var(--border); }
.speaker-card.status-in { border-left-color:var(--success); }
.speaker-card.status-out { border-left-color:var(--muted); }
.card-main { display:flex; align-items:center; padding:16px 14px; gap:14px; cursor:pointer; }
.avatar-wrap { position:relative; flex-shrink:0; }
.avatar { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--border); }
.avatar-placeholder { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#c7d5ee,#a0b8dc); display:flex; align-items:center; justify-content:center; font-size:32px; border:3px solid var(--border); flex-shrink:0; }
.status-dot { position:absolute; bottom:3px; right:3px; width:18px; height:18px; border-radius:50%; border:3px solid white; background:var(--border); }
.status-dot.in { background:var(--success); }
.status-dot.out { background:var(--muted); }
.card-info { flex:1; min-width:0; }
.card-name { font-family:'Kanit',sans-serif; font-size:17px; font-weight:700; line-height:1.3; }
.card-hotel { font-size:14px; color:var(--muted); margin-top:3px; }
.card-date { font-size:13px; color:var(--muted); margin-top:2px; }
.card-times { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.time-badge { font-size:12px; padding:4px 11px; border-radius:20px; font-weight:600; }
.time-badge.in { background:#dcfce7; color:var(--success); }
.time-badge.out { background:#f3f4f6; color:var(--muted); }
.card-arrow { font-size:24px; color:var(--border); flex-shrink:0; }

.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.info-item { background:var(--bg); border-radius:var(--radius-sm); padding:10px 12px; }
.info-item label { font-size:11px; color:var(--muted); display:block; margin-bottom:3px; }
.info-item span { font-size:14px; font-weight:500; }

.action-row { display:flex; gap:10px; }
.btn { flex:1; padding:13px; border:none; border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
.btn-in { background:var(--success); color:white; }
.btn-in:disabled { background:#86efac; cursor:not-allowed; }
.btn-out { background:var(--danger); color:white; }
.btn-out:disabled { background:#fca5a5; cursor:not-allowed; }
.btn-reset { background:var(--bg); color:var(--muted); border:2px solid var(--border); padding:11px 16px; border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif; font-size:13px; cursor:pointer; }

.input-field { width:100%; padding:9px 10px; border:2px solid var(--border); border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif; font-size:14px; color:var(--text); background:white; outline:none; }
.input-field:focus { border-color:var(--primary); }

.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; box-shadow:0 -2px 16px rgba(26,79,160,0.12); display:flex; z-index:100; }
.nav-btn { flex:1; padding:12px 6px 14px; border:none; background:transparent; font-family:'Sarabun',sans-serif; font-size:10px; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; }
.nav-btn .nav-icon { font-size:22px; }
.nav-btn.active { color:var(--primary); }

.table-wrap { overflow-x:auto; border-radius:var(--radius); box-shadow:var(--shadow); background:white; }
table { width:100%; border-collapse:collapse; font-size:12px; min-width:480px; }
thead th { background:var(--primary); color:white; padding:10px 8px; text-align:left; font-family:'Kanit',sans-serif; font-weight:500; }
tbody tr { border-bottom:1px solid var(--border); }
tbody tr:hover { background:rgba(26,79,160,0.03); }
tbody td { padding:9px 8px; }
.status-pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.status-pill.in { background:#dcfce7; color:var(--success); }
.status-pill.out { background:#f3f4f6; color:var(--muted); }
.status-pill.none { background:#fef9ec; color:var(--accent); }

.settings-card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:14px; }
.settings-title { font-family:'Kanit',sans-serif; font-size:15px; font-weight:600; margin-bottom:12px; color:var(--primary); }
.setting-item { padding:12px 0; border-bottom:1px solid var(--border); }
.setting-item:last-child { border-bottom:none; }
.setting-label { font-size:14px; font-weight:500; margin-bottom:3px; }
.setting-desc { font-size:12px; color:var(--muted); margin-bottom:6px; }
.setting-input { width:100%; padding:10px 12px; border:2px solid var(--border); border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif; font-size:14px; color:var(--text); outline:none; }
.setting-input:focus { border-color:var(--primary); }
.btn-primary { background:var(--primary); color:white; border:none; padding:12px 24px; border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif; font-size:14px; font-weight:600; cursor:pointer; width:100%; margin-top:10px; }
.btn-danger { background:var(--danger); color:white; border:none; padding:11px 20px; border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif; font-size:13px; cursor:pointer; margin-top:8px; width:100%; }
.alert-info { background:#eff6ff; color:var(--primary); border:1px solid #bfdbfe; border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; line-height:1.7; }

.page { display:none; }
.page.active { display:block; }
.loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
.spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:10px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.empty .empty-icon { font-size:48px; margin-bottom:12px; }

.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e2a3a; color:white; padding:10px 20px; border-radius:30px; font-size:13px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🎤</div>
  <h1>แผนกต้อนรับวิทยากร</h1>
  <div class="header-sub">Speaker Reception System</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="toast" id="toast"></div>

<div class="main">
  <!-- LIST PAGE -->
  <div class="page active" id="page-list">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchType('outside')" id="tab-outside">🌐 วิทยากรภายนอก <span class="badge" id="badge-outside">0</span></button>
      <button class="tab-btn" onclick="switchType('inside')" id="tab-inside">🏥 วิทยากรภายใน <span class="badge" id="badge-inside">0</span></button>
    </div>
    <div class="summary-row">
      <div class="sum-card c-all" onclick="filterStatus('')" id="sum-card-all" style="cursor:pointer;">
        <div class="sum-num" id="sum-total">0</div>
        <div class="sum-lbl">ทั้งหมด</div>
      </div>
      <div class="sum-card c-in" onclick="filterStatus('in')" id="sum-card-in" style="cursor:pointer;">
        <div class="sum-num" id="sum-in">0</div>
        <div class="sum-lbl">🟢 เข้าแล้ว</div>
      </div>
      <div class="sum-card c-out" onclick="filterStatus('out')" id="sum-card-out" style="cursor:pointer;">
        <div class="sum-num" id="sum-out">0</div>
        <div class="sum-lbl">⚫ กลับแล้ว</div>
      </div>
    </div>
    <div class="search-wrap">
      <span>🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="ค้นหาชื่อวิทยากร..." oninput="renderList()">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
      <div style="position:relative;flex:1;">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;">📅</span>
        <select id="dateFilter" onchange="renderList()" style="width:100%;padding:11px 12px 11px 38px;border:2px solid var(--border);border-radius:var(--radius-sm);font-family:'Sarabun',sans-serif;font-size:14px;background:white;color:var(--text);outline:none;box-shadow:var(--shadow);appearance:none;">
          <option value="">-- ทุกวัน --</option>
        </select>
      </div>
      <button onclick="loadFromSheets()" style="padding:11px 14px;background:white;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:18px;cursor:pointer;box-shadow:var(--shadow);" title="รีโหลด">🔄</button>
    </div>
    <div id="listContent"><div class="loading"><div class="spinner"></div><br>กำลังโหลด...</div></div>
  </div>

  <!-- TABLE PAGE -->
  <div class="page" id="page-table">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchType2('outside')" id="tab2-outside">🌐 ภายนอก</button>
      <button class="tab-btn" onclick="switchType2('inside')" id="tab2-inside">🏥 ภายใน</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>ชื่อ</th><th>โรงแรม</th><th>เข้า</th><th>ออก</th><th>สถานะ</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- SETTINGS PAGE (เฉพาะรีโหลด) -->
  <div class="page" id="page-settings">
    <div class="settings-card">
      <div class="settings-title">🔄 รีโหลดข้อมูล</div>
      <div class="setting-item">
        <div class="setting-label">โหลดรายชื่อวิทยากรใหม่จาก Google Sheets</div>
        <div class="setting-desc">กดเมื่อมีการเพิ่ม/แก้ไขรายชื่อใน Sheets</div>
        <button class="btn-primary" onclick="loadFromSheets()" style="margin-top:8px">🔄 รีโหลดข้อมูล</button>
      </div>
      <div class="setting-item">
        <div class="setting-label">🔗 เปิด Google Sheets</div>
        <a href="https://docs.google.com/spreadsheets/d/1N2vycHqNPciioHavyXu_Po6PdEbPZw2qsiSmzh-7fRM/edit" target="_blank"
          style="display:block;margin-top:8px;background:#34a853;color:white;text-align:center;padding:12px;border-radius:var(--radius-sm);font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;text-decoration:none;">
          📊 เปิด Google Sheets
        </a>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('list')" id="nav-list"><span class="nav-icon">👥</span>รายชื่อ</button>
  <button class="nav-btn" onclick="showPage('table')" id="nav-table"><span class="nav-icon">📊</span>ตาราง</button>
  <button class="nav-btn" onclick="showPage('settings')" id="nav-settings"><span class="nav-icon">🔄</span>รีโหลด</button>
</div>

<!-- MODAL -->
<div id="backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;" onclick="closeModal()"></div>
<div id="modal" style="display:none;position:fixed;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;z-index:201;max-height:92vh;overflow-y:auto;padding:16px 16px 36px;">
  <div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;"></div>
  <div id="modalContent"></div>
</div>

<script type="module">
let speakers = { outside: [], inside: [] };
let records = {};
let currentType = 'outside';
let currentType2 = 'outside';
let cfg = { id: '1N2vycHqNPciioHavyXu_Po6PdEbPZw2qsiSmzh-7fRM', external: 'วิทยากรภายนอก', internal: 'วิทยากรภายใน' };

function init() {
  setDate();
  const r = localStorage.getItem('spkRec');
  if (r) records = JSON.parse(r);
  const d = localStorage.getItem('spkData');
  if (d) { speakers = JSON.parse(d); renderList(); renderTable(); updateSummary(); }
  loadFromSheets();
  setTimeout(restoreAlarms, 1500);
  // รีโหลดอัตโนมัติทุก 5 นาที
  setInterval(() => {
    loadFromSheets();
    showToast('🔄 รีโหลดอัตโนมัติ');
  }, 5 * 60 * 1000);
  // อัพเดตสถานะทุก 1 นาที (เพราะเปรียบเทียบกับเวลาปัจจุบัน)
  setInterval(() => {
    renderList(); renderTable();
  }, 60 * 1000);
}

function setDate() {
  const d = new Date();
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  document.getElementById('headerDate').textContent = `วัน${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`;
}

async function loadFromSheets() {
  if (!cfg.id) { document.getElementById('listContent').innerHTML = `<div class="alert-info" style="margin:0;border-radius:var(--radius-sm);">⚙️ กรุณาตั้งค่า Sheet ID ในหน้าตั้งค่าก่อนครับ</div>`; return; }
  document.getElementById('listContent').innerHTML = `<div class="loading"><div class="spinner"></div><br>กำลังโหลดข้อมูลจาก Google Sheets...</div>`;
  try {
    const [ext, int_] = await Promise.all([fetchSheet(cfg.external), fetchSheet(cfg.internal)]);
    speakers.outside = ext;
    speakers.inside = int_;
    localStorage.setItem('spkData', JSON.stringify(speakers));
    // ดึงข้อมูลเวลา/รถ/ทะเบียนจาก Sheets มา merge ด้วย
    mergeSheetDataToRecords('outside', ext);
    mergeSheetDataToRecords('inside', int_);
    renderList(); renderTable(); updateSummary();
    showToast('✅ โหลดข้อมูลสำเร็จ ' + (ext.length + int_.length) + ' คน');
  } catch(e) {
    console.error(e);
    if (speakers.outside.length || speakers.inside.length) {
      renderList(); renderTable(); updateSummary();
      showToast('⚠️ ใช้ข้อมูลที่บันทึกไว้');
    } else {
      document.getElementById('listContent').innerHTML = `<div class="alert-info" style="border-radius:var(--radius-sm);">
        ❌ ไม่สามารถโหลดข้อมูลได้<br><br>
        <strong>กรุณา:</strong><br>
        1. ไป Google Sheets → ไฟล์ → แชร์ → เผยแพร่ไปยังเว็บ → เผยแพร่<br>
        2. กลับมากด รีโหลด ในหน้าตั้งค่า
      </div>`;
    }
  }
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${cfg.id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows.filter(r => r.c && r.c[3] && r.c[3].v).map((r,i) => ({
    index: i,
    num:     r.c[0]?.v || (i+1),
    date:    r.c[1]?.f || r.c[1]?.v || '',
    name:    r.c[3]?.v || '',
    hotel:   r.c[4]?.v || '',
    timeIn:  parseSheetTime(r.c[5]),
    timeOut: parseSheetTime(r.c[6]),
    car:     r.c[7]?.v || '',
    plate:   r.c[8]?.v || '',
  }));
}

// แปลงค่าเวลาจาก Google Sheets ให้เป็น HH:MM
function parseSheetTime(cell) {
  if (!cell) return '';

  // ลอง formatted value ก่อน เช่น "9:00:00" หรือ "09:00"
  if (cell.f) {
    const m = cell.f.toString().match(/^(\d{1,2}):(\d{2})/);
    if (m) return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
  }

  const val = cell.v;
  if (!val && val !== 0) return '';

  // กรณี string "Date(1899,11,30,9,0,0)"
  if (typeof val === 'string' && val.startsWith('Date(')) {
    const parts = val.replace('Date(','').replace(')','').split(',').map(Number);
    const h = String(parts[3]||0).padStart(2,'0');
    const m = String(parts[4]||0).padStart(2,'0');
    return `${h}:${m}`;
  }

  // กรณี string HH:MM หรือ HH:MM:SS
  if (typeof val === 'string' && val.includes(':')) {
    const m = val.match(/^(\d{1,2}):(\d{2})/);
    if (m) return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
  }

  // กรณี number (fraction of day เช่น 0.375 = 09:00)
  if (typeof val === 'number' && val >= 0 && val < 1) {
    const totalMins = Math.round(val * 24 * 60);
    const h = String(Math.floor(totalMins / 60) % 24).padStart(2,'0');
    const m = String(totalMins % 60).padStart(2,'0');
    return `${h}:${m}`;
  }

  return '';
}

// นำข้อมูลจาก Sheets มา merge เข้า records
function mergeSheetDataToRecords(type, list) {
  list.forEach((s, i) => {
    const key = `${type}-${i}`;
    if (!records[key]) records[key] = {};
    // ถ้า Sheets มีข้อมูล ให้ใช้ข้อมูลจาก Sheets เป็นหลัก
    if (s.timeIn)  records[key].timeIn  = s.timeIn;
    if (s.timeOut) records[key].timeOut = s.timeOut;
    if (s.car)     records[key].car     = s.car;
    if (s.plate)   records[key].plate   = s.plate;
  });
  saveRec();
}

function getUniqueDates() {
  const list = speakers[currentType];
  const dates = [...new Set(list.map(s => s.date).filter(Boolean))];
  return dates;
}

function updateDateFilter() {
  const sel = document.getElementById('dateFilter');
  if (!sel) return;
  const current = sel.value;
  const dates = getUniqueDates();
  sel.innerHTML = `<option value="">-- ทุกวัน (${speakers[currentType].length} คน) --</option>`;
  dates.forEach(d => {
    const count = speakers[currentType].filter(s => s.date === d).length;
    sel.innerHTML += `<option value="${d}" ${current===d?'selected':''}>${d} (${count} คน)</option>`;
  });
}

function renderList() {
  const list = speakers[currentType];
  const q = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
  const dateF = document.getElementById('dateFilter')?.value || '';
  const filtered = list.filter(s => {
    if (!s.name.toLowerCase().includes(q)) return false;
    if (dateF && s.date !== dateF) return false;
    if (currentStatusFilter) {
      const rec = records[`${currentType}-${s.index}`]||{};
      const st = getSmartStatus(rec);
      if (currentStatusFilter === 'out' && !st.done) return false;
      if (currentStatusFilter === 'in' && (st.done || !rec.timeIn)) return false;
    }
    return true;
  });
  updateSummary();
  updateDateFilter();

  if (!filtered.length) {
    document.getElementById('listContent').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>ไม่พบวิทยากร</div>`;

    const hasIn = !!rec.timeIn, hasOut = !!rec.timeOut;

      ? (() => {

      : rec.timeIn

      : `<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#fef9ec;color:var(--accent);font-weight:600;">🟡 รอ</span>`;
    return `<div class="speaker-card ${card}">
      <div class="card-main" onclick="openModal('${currentType}',${s.index})">
        <div class="avatar-wrap">${photo}<div class="status-dot ${dot}"></div></div>

let currentStatusFilter = ''; // '', 'in', 'out', 'wait'

function filterStatus(s) {
  currentStatusFilter = currentStatusFilter === s ? '' : s;
  // highlight ปุ่ม
  ['all','in','out'].forEach(k => {
    const el = document.getElementById(`sum-card-${k}`);
    if (el) el.style.outline = '';
  });
  const map = {'':'all','in':'in','out':'out'};
  const activeKey = map[currentStatusFilter] || 'all';
  const el = document.getElementById(`sum-card-${activeKey}`);
  if (el) el.style.outline = '3px solid var(--primary)';
  renderList();
}

function updateSummary() {
  const list = speakers[currentType];
  let inC=0, outC=0, waitC=0;
  list.forEach((s,i) => {
    const r = records[`${currentType}-${s.index}`]||{};
    const st = getSmartStatus(r);
    if (st.done) outC++;
    else if (r.timeIn) inC++;
    else waitC++;
  });
  document.getElementById('sum-total').textContent = list.length;
  document.getElementById('sum-in').textContent = inC;
  document.getElementById('sum-out').textContent = outC;
  document.getElementById('badge-outside').textContent = speakers.outside.length;
  document.getElementById('badge-inside').textContent = speakers.inside.length;
}

// คำนวณสถานะตามเวลาจริง
function getSmartStatus(rec) {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();

  function toMins(t) {
    if (!t) return null;
    const parts = t.toString().split(':');
    if (parts.length < 2) return null;
    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  }

  const inMins = toMins(rec.timeIn);
  const outMins = toMins(rec.timeOut);

  // ไม่มีข้อมูลเลย
  if (!inMins && !outMins) return { text: 'รอ', color: 'var(--accent)', bg: '#fef9ec', icon: '🟡', done: false };

  if (outMins !== null) {
    if (nowMins >= outMins) {
      // เลยเวลาออกแล้ว = กลับแล้ว
      return { text: 'กลับแล้ว', color: 'var(--muted)', bg: '#f3f4f6', icon: '⚫', done: true };
    } else {
      // ยังไม่ถึงเวลาออก = นับถอยหลัง
      const diff = outMins - nowMins;
      const h = Math.floor(diff / 60);
      const m = diff % 60;
      const countdown = h > 0 ? `${h}ชม. ${m}น.` : `${m} น.`;
      return { text: `ออกใน ${countdown}`, color: '#d97706', bg: '#fffbeb', icon: '⏳', done: false };
    }
  }

  // มีเวลาเข้าแต่ยังไม่มีเวลาออก
  return { text: 'เข้าแล้ว', color: 'var(--success)', bg: '#dcfce7', icon: '🟢', done: false };
}

// ===== PHOTO PAN & ZOOM =====
let photoState = {}; // per key: {x, y, scale, startX, startY, lastDist}

function initPhotoInteraction(key, type, idx) {
  const img = document.getElementById(`photoImg-${key}`);
  const frame = document.getElementById(`photoFrame-${key}`);
  if (!img || !frame) return;

  const rec = records[key] || {};
  const t = rec.photoTransform || {x:0, y:0, scale:1};
  if (!photoState[key]) photoState[key] = {x:t.x||0, y:t.y||0, scale:t.scale||1, dragging:false, lastDist:0};
  const st = photoState[key];

  function applyTransform() {
    // clamp x,y ให้อยู่ใน 0-100 range
    st.x = Math.max(-50, Math.min(50, st.x));
    st.y = Math.max(-50, Math.min(50, st.y));
    const px = 50 + st.x;
    const py = 50 + st.y;
    img.style.objectPosition = `${px}% ${py}%`;
    img.style.transform = `scale(${st.scale})`;
  }

  applyTransform();

  // Touch drag on frame
  frame.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      st.dragging = true;
      st.startClientX = e.touches[0].clientX;
      st.startClientY = e.touches[0].clientY;
      st.startX = st.x;
      st.startY = st.y;
    } else if (e.touches.length === 2) {
      st.dragging = false;
      st.lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      e.preventDefault();
    }
  }, {passive:true});

  frame.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && st.dragging) {
      e.preventDefault();
      const dx = (e.touches[0].clientX - st.startClientX) / frame.offsetWidth * 100;
      const dy = (e.touches[0].clientY - st.startClientY) / frame.offsetHeight * 100;
      st.x = st.startX - dx; // invert: drag right = move focus left
      st.y = st.startY - dy;
      applyTransform();
    } else if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      st.scale = Math.max(1, Math.min(4, st.scale * (dist / st.lastDist)));
      st.lastDist = dist;
      applyTransform();
    }
  }, {passive:false});

  frame.addEventListener('touchend', () => { st.dragging = false; });

  // Mouse drag
  frame.addEventListener('mousedown', e => {
    st.dragging = true;
    st.startClientX = e.clientX;
    st.startClientY = e.clientY;
    st.startX = st.x;
    st.startY = st.y;
    img.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!st.dragging) return;
    const dx = (e.clientX - st.startClientX) / frame.offsetWidth * 100;
    const dy = (e.clientY - st.startClientY) / frame.offsetHeight * 100;
    st.x = st.startX - dx;
    st.y = st.startY - dy;
    applyTransform();
  });
  document.addEventListener('mouseup', () => { st.dragging = false; if(img) img.style.cursor='grab'; });
}

function zoomPhoto(key, delta) {
  if (!photoState[key]) photoState[key] = {x:0,y:0,scale:1,dragging:false};
  const st = photoState[key];
  st.scale = Math.max(1, Math.min(4, st.scale + delta));
  const img = document.getElementById(`photoImg-${key}`);
  if (img) {
    img.style.transform = `scale(${st.scale})`;
    img.style.objectPosition = `${50+st.x}% ${50+st.y}%`;
  }
}

// Alarm system
let alarmTimers = {};

function setAlarm(type, idx) {
  const key=`${type}-${idx}`;
  const t = document.getElementById(`alarm-${key}`).value;
  if(!t) { showToast('⚠️ กรุณาเลือกเวลาก่อน'); return; }

  // Request notification permission
  if ('Notification' in window && Notification.permission !== 'granted') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') doSetAlarm(type, idx, key, t);
      else showToast('⚠️ กรุณาอนุญาตการแจ้งเตือนก่อน');
    });
    return;
  }
  doSetAlarm(type, idx, key, t);
}

function doSetAlarm(type, idx, key, t) {
  if(!records[key]) records[key]={};
  records[key].alarm = t;
  saveRec();

  // Clear existing
  if(alarmTimers[key]) clearTimeout(alarmTimers[key]);

  const now_ = new Date();
  const [h,m] = t.split(':').map(Number);
  const alarm = new Date(now_.getFullYear(), now_.getMonth(), now_.getDate(), h, m, 0);
  let ms = alarm - now_;
  if(ms < 0) ms += 86400000;

  const name = speakers[type][idx]?.name || '';

  // ส่งไปให้ Service Worker จัดการ (ทำงานแม้ปิดแอป)
  if (swReg && swReg.active) {
    swReg.active.postMessage({ type:'SET_ALARM', key, name, time:t, ms });
  }

  // Fallback: timer ใน tab นี้ด้วย
  alarmTimers[key] = setTimeout(() => triggerAlarm(name, t, key), ms);

  const mins = Math.round(ms/60000);
  showToast(`🔔 ตั้งเตือน ${t} (อีก ${mins} นาที)`);
  openModal(type, idx);
}

function clearAlarm(type, idx) {
  const key=`${type}-${idx}`;
  if(alarmTimers[key]) clearTimeout(alarmTimers[key]);
  // แจ้ง SW ยกเลิกด้วย
  if (swReg && swReg.active) swReg.active.postMessage({ type:'CLEAR_ALARM', key });
  if(records[key]) delete records[key].alarm;
  saveRec(); showToast('❌ ยกเลิกการแจ้งเตือนแล้ว');
  openModal(type, idx);
}

function triggerAlarm(name, time, key) {
  // Vibrate
  if (navigator.vibrate) navigator.vibrate([500,200,500,200,500]);

  // Browser notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('🎤 แจ้งเตือนวิทยากร', {
      body: `ถึงเวลา ${time} — ${name}`,
      icon: '🎤',
      tag: key
    });
  }

  // In-app alert banner
  showAlarmBanner(name, time);
}

function showAlarmBanner(name, time) {
  const banner = document.createElement('div');
  banner.style.cssText = `position:fixed;top:0;left:0;right:0;background:#e8a020;color:white;padding:16px;text-align:center;z-index:9999;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);`;
  banner.innerHTML = `🔔 ถึงเวลา <strong>${time}</strong> — ${name} <br><button onclick="this.parentElement.remove()" style="margin-top:8px;background:white;color:#e8a020;border:none;padding:6px 20px;border-radius:20px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">รับทราบ</button>`;
  document.body.appendChild(banner);
  // Also play beep
  playBeep();
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0,300,600].forEach(delay => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime + delay/1000);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay/1000 + 0.3);
      o.start(ctx.currentTime + delay/1000);
      o.stop(ctx.currentTime + delay/1000 + 0.3);
    });
  } catch(e) {}
}

// Restore alarms from localStorage on page load
function restoreAlarms() {
  Object.entries(records).forEach(([key, rec]) => {
    if (!rec.alarm) return;
    const [type, idx] = key.split('-');
    const now_ = new Date();
    const [h,m] = rec.alarm.split(':').map(Number);
    const alarm = new Date(now_.getFullYear(), now_.getMonth(), now_.getDate(), h, m, 0);
    let ms = alarm - now_;
    if(ms < 0) return; // already passed
    const name = speakers[type]?.[parseInt(idx)]?.name || '';
    alarmTimers[key] = setTimeout(() => triggerAlarm(name, rec.alarm, key), ms);
  });
}

function handlePhoto(input,type,idx) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const key=`${type}-${idx}`;
    if(!records[key]) records[key]={};
    records[key].photo=e.target.result;
    localStorage.setItem('spkRec',JSON.stringify(records));
    openModal(type,idx); renderList();
    // sync รูปขึ้น Firebase (บีบอัดแล้ว)
    syncPhoto(key, e.target.result);
  };
  reader.readAsDataURL(file);
}

  }
}

// บีบอัดรูปให้เล็กก่อน sync (max 400px, quality 0.5 → ~30-50KB)
function compressImage(dataUrl, maxW=400, quality=0.5) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ratio = Math.min(1, maxW / Math.max(img.width, img.height));
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

// Sync รูปขึ้น Firebase
async function syncPhoto(key, dataUrl) {
  try {
    showToast('⏳ กำลังซิงค์รูป...');
    const compressed = await compressImage(dataUrl);
    await set(ref(fbDb, `photos/${key}`), compressed);
    showToast('📷 ซิงค์รูปสำเร็จ');
  } catch(e) {
    console.error(e);
    showToast('⚠️ ซิงค์รูปไม่สำเร็จ');
  }
}

// Listen records
onValue(ref(fbDb, 'records'), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;
  let changed = false;
  Object.entries(data).forEach(([k, v]) => {
    if (!records[k]) records[k] = {};
    ['timeIn','timeOut','car','plate','alarm'].forEach(f => {
      if (v[f] !== undefined && records[k][f] !== v[f]) { records[k][f] = v[f]; changed = true; }
    });
  });
  if (changed) {
    localStorage.setItem('spkRec', JSON.stringify(records));
    renderList(); renderTable(); updateSummary();
  }
});

// Listen photos
onValue(ref(fbDb, 'photos'), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;
  let changed = false;
  Object.entries(data).forEach(([k, photoData]) => {
    if (!records[k]) records[k] = {};
    if (records[k].photo !== photoData) {
      records[k].photo = photoData;
      changed = true;
    }
  });
  if (changed) {
    localStorage.setItem('spkRec', JSON.stringify(records));
    renderList(); renderTable();
    showToast('🖼️ ซิงค์รูปภาพแล้ว');
  }
});
